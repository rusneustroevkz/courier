version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/users/query.sql"
    schema: "migrations"
    gen:
      go:
        package: "users"
        out: "internal/users"
        sql_package: "database/sql"
        output_db_file_name: "repository.go"
        emit_interface: true
        emit_db_tags: true