services:
  redis:
    container_name: redis
    image: redis:8.6-alpine
    restart: always
    env_file:
      - .env
    expose:
      - 6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - postgres_courier-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  postgres_courier-net:
    external: true

volumes:
  redis_data: