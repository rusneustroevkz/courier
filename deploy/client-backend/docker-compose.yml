services:
  client-backend:
    container_name: client-backend
    build:
      context: ../../
      dockerfile: deploy/client-backend/Dockerfile
    env_file:
      - .env
    restart: always
    expose:
      - 8080
    networks:
      - postgres_courier-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  postgres_courier-net:
    external: true